# ==========================================
# CONFIGURAÇÕES GERAIS
# ==========================================
quarkus.application.name=house-italian

# ==========================================
# BANCO H2 - usado em desenvolvimento
# (%dev. = só vale quando roda ./mvnw quarkus:dev)
# ==========================================
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:housitalian;DB_CLOSE_DELAY=-1
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=

# ==========================================
# BANCO POSTGRESQL - usado em produção
# (%prod. = só vale no build final)
# ==========================================
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/housitalian_db
%prod.quarkus.datasource.username=postgres
%prod.quarkus.datasource.password=sua_senha_aqui

# ==========================================
# HIBERNATE ORM
# ==========================================
# drop-and-create = apaga e recria as tabelas toda vez (ótimo para dev)
%dev.quarkus.hibernate-orm.database.generation=drop-and-create

# validate = só valida se as tabelas existem (seguro para produção)
%prod.quarkus.hibernate-orm.database.generation=update

# Mostra as queries SQL no console (útil para depurar)
%dev.quarkus.hibernate-orm.log.sql=true

# ==========================================
# JWT - Token de autenticação
# ==========================================
mp.jwt.verify.issuer=house-italian
quarkus.smallrye-jwt.new-token.issuer=house-italian
quarkus.smallrye-jwt.new-token.lifespan=3600